name: Generate Isometric Calendar

# Allow the workflow to push to branches (needed for the push step)
permissions:
  contents: write

on:
  # Run automatically every 24 hours
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  # Allows you to manually run the job at any time from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Vaidik-Pipaliya

      - name: Move SVG to dist
        run: |
          mkdir -p dist
          cp profile-3d-contrib/profile-night-green-animate.svg dist/isocalendar.svg

      - name: List dist contents (debug)
        run: |
          echo "Listing generated files (dist):"
          ls -la dist || true

      - name: Fail if dist is empty
        run: |
          if [ ! -d dist ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "No generated files found in dist. Aborting push."
            exit 1
          fi

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
